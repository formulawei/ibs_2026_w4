<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IBS W4｜Sources of Competitive Strategy</title>
  <style>
/* ════════════════════════════════════════════
   NTU blue palette  (IIB-spirit, IBS colours)
   ════════════════════════════════════════════ */
:root{
  --ntu:#002B5C;   --ntu2:#01356F;  --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220;   --muted:#475569;
  --muted2:#64748B;--line:#D7DEE9;  --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  /* segment accent colours */
  --s0:#1A6B4A;  --t1:#6B21A8;  --t2:#1A4A8B;
  --t3:#7A3A00;  --c1:#9A3412;  --s1:#0E7490;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:17px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn:active{transform:translateY(1px);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;
  max-width:1480px;margin:0 auto;}
/* ── Sidebar ── */
.sidebar{position:sticky;top:86px;align-self:start;
  border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;
  border:1px solid transparent;background:transparent;cursor:pointer;
  font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(26,107,74,.10);border-color:rgba(26,107,74,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(107,33,168,.10);border-color:rgba(107,33,168,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(26,74,139,.10);border-color:rgba(26,74,139,.25);color:var(--t2);}
.navItem.seg-t3.active{background:rgba(122,58,0,.10);border-color:rgba(122,58,0,.25);color:var(--t3);}
.navItem.seg-c1.active{background:rgba(154,52,18,.10);border-color:rgba(154,52,18,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(14,116,144,.10);border-color:rgba(14,116,144,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;
  border:1px solid var(--line);border-radius:7px;background:#fff;
  color:var(--muted);font-size:10px;}

/* ── Content ── */
.content{border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;
  gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(0,43,92,.25);background:rgba(0,43,92,.08);
  color:var(--ntu);padding:8px 14px;border-radius:999px;
  font-weight:800;white-space:nowrap;font-size:13px;}

/* time tracker */
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.cur{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.t3{background:var(--t3);color:#fff;border-color:var(--t3);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}

/* ── Cards / Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}

/* ── Callout ── */
.callout{border-left:5px solid var(--ntu);padding:12px 14px;
  background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}

/* ── Pill row ── */
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 11px;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);}
.dot.g{background:#15803d;}
.dot.p{background:#7C3AED;}
.dot.r{background:#DC2626;}
.dot.o{background:#EA580C;}

/* ── Poll / Quiz ── */
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);
  border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;
  cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;
  font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);
  overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));
  transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}

/* ── Sliders ── */
.sliderRow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0;}
input[type=range]{width:min(340px,100%);accent-color:var(--ntu);cursor:pointer;}
.valBadge{font-family:var(--mono);font-weight:800;padding:5px 10px;
  border:1px solid var(--line);border-radius:10px;background:#fff;
  font-size:14px;color:var(--ntu);}

/* ── Drag-drop fill-in ── */
.dflex{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.dchip{border:1.5px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 12px;cursor:grab;font-weight:700;font-size:13px;
  color:var(--ntu);user-select:none;transition:.1s ease;touch-action:none;}
.dchip:hover{border-color:rgba(0,43,92,.40);background:rgba(0,43,92,.05);}
.dchip.dragging{opacity:.45;box-shadow:0 8px 20px rgba(0,0,0,.15);}
.dropzone{display:inline-block;min-width:130px;min-height:32px;
  border-bottom:2.5px dashed rgba(0,43,92,.35);padding:2px 8px;
  border-radius:0 0 0 0;font-weight:700;color:var(--ntu);
  background:rgba(0,43,92,.04);cursor:pointer;vertical-align:middle;
  font-size:14px;transition:.1s ease;}
.dropzone.over{border-color:var(--ntu);background:rgba(0,43,92,.10);}
.dropzone.filled{border-style:solid;border-color:var(--ntu);background:rgba(0,43,92,.07);}
.dropzone.correct-fill{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.dropzone.wrong-fill{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.dfeedback{font-size:13px;font-weight:700;margin-top:8px;min-height:20px;color:var(--muted);}

/* ── Image frames ── */
.imgFrame{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.08);margin:14px 0;}
.imgFrame img{width:100%;display:block;}
.imgCaption{padding:8px 12px;background:rgba(0,43,92,.04);
  font-size:12px;color:var(--muted);border-top:1px solid var(--line);}

/* ── VC highlight interactive ── */
.vcGrid{display:grid;grid-template-rows:auto auto;gap:0;
  border:2px solid var(--line);border-radius:14px;overflow:hidden;margin:14px 0;}
.vcSupport{display:grid;grid-template-rows:repeat(4,auto);background:#F0FDF4;}
.vcRow{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--line);
  font-weight:700;font-size:13px;cursor:pointer;transition:.1s ease;gap:10px;}
.vcRow:hover{background:rgba(21,128,61,.08);}
.vcRow.hl{background:rgba(21,128,61,.18);color:#14532d;}
.vcPrimary{display:grid;grid-template-columns:repeat(5,1fr);background:#FFFBEB;}
.vcCell{padding:10px 6px;text-align:center;font-weight:700;font-size:12px;
  border-right:1px solid var(--line);cursor:pointer;transition:.1s ease;line-height:1.4;}
.vcCell:last-child{border-right:none;}
.vcCell:hover{background:rgba(201,162,39,.15);}
.vcCell.hl{background:rgba(201,162,39,.35);color:#5A4600;}
.vcMargin{display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#15803d,#1A6B4A);color:#fff;
  font-weight:900;font-size:12px;writing-mode:vertical-rl;
  text-orientation:mixed;padding:10px;letter-spacing:.08em;}
.vcInner{display:grid;grid-template-columns:1fr auto;}
.vcTooltip{margin:10px 0;padding:10px 12px;border-radius:12px;
  background:rgba(0,43,92,.06);border:1px solid rgba(0,43,92,.15);
  font-size:13px;color:var(--ink);min-height:44px;line-height:1.6;}

/* ── BMC grid ── */
.bmcGrid{display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr;
  grid-template-rows:auto auto auto;
  gap:0;border:2px solid var(--line);border-radius:14px;overflow:hidden;
  margin:14px 0;font-size:12px;}
.bmc-cell{padding:8px 10px;border:1px solid var(--line);cursor:pointer;
  transition:.1s ease;line-height:1.5;}
.bmc-cell:hover{background:rgba(122,58,0,.08);}
.bmc-cell.hl{background:rgba(122,58,0,.16);border-color:rgba(122,58,0,.35);}
.bmc-title{font-weight:900;color:var(--t3);font-size:11px;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.bmc-body{color:var(--muted);font-size:11px;}
/* span rows/cols */
.bmc-kp{grid-column:1;grid-row:1/3;}
.bmc-ka{grid-column:2;grid-row:1;}
.bmc-kr{grid-column:2;grid-row:2;}
.bmc-vp{grid-column:3;grid-row:1/3;}
.bmc-cr{grid-column:4;grid-row:1;}
.bmc-ch{grid-column:4;grid-row:2;}
.bmc-cs{grid-column:5;grid-row:1/3;}
.bmc-cost{grid-column:1/4;grid-row:3;}
.bmc-rev{grid-column:4/6;grid-row:3;}
.bmc-tooltip{margin:8px 0 4px;padding:8px 12px;border-radius:11px;
  background:rgba(122,58,0,.06);border:1px solid rgba(122,58,0,.18);
  font-size:13px;color:var(--ink);min-height:38px;line-height:1.6;}

/* ── Financial table ── */
.finWrap{overflow-x:auto;margin:14px 0;}
.finTable{width:100%;border-collapse:collapse;font-size:13px;}
.finTable th{background:rgba(0,43,92,.08);color:var(--ntu);
  padding:7px 10px;text-align:center;border:1px solid var(--line);font-size:12px;}
.finTable td{padding:6px 10px;border:1px solid var(--line);font-size:13px;vertical-align:middle;}
.finTable tr:nth-child(even) td{background:#F8FAFC;}
.finTable .rl{font-weight:700;color:var(--ntu2);min-width:180px;}
.pos{color:#166534;font-weight:700;}
.neg{color:#991B1B;font-weight:700;}
.finTable .hilite td{background:rgba(201,162,39,.10)!important;font-weight:700;}
.finTable .secrow td{background:rgba(0,43,92,.05)!important;font-weight:800;color:var(--ntu);}

/* ── Stuck-in-middle diagram ── */
.stuckCard{background:linear-gradient(135deg,rgba(201,162,39,.08),rgba(0,43,92,.04));
  border:1px solid rgba(201,162,39,.30);border-radius:var(--radius);padding:16px;}

/* ── Highlight box ── */
.highlight{background:linear-gradient(135deg,rgba(201,162,39,.14),rgba(0,43,92,.07));
  border:1px solid rgba(201,162,39,.35);border-radius:14px;padding:14px;margin:10px 0;}
.highlightTitle{font-weight:900;color:var(--ntu);margin-bottom:6px;font-size:14px;}

/* ── Toast ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(11,18,32,.92);color:#fff;padding:10px 18px;border-radius:999px;
  font-weight:800;box-shadow:0 14px 30px rgba(0,0,0,.22);z-index:99;
  opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;font-size:14px;
  border-left:4px solid var(--gold);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-3px);}

/* ── Student worksheet ── */
.wsCard{border:1.5px solid rgba(0,43,92,.20);border-radius:var(--radius);
  background:rgba(0,43,92,.03);padding:16px;margin:14px 0;}
.wsLabel{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted2);margin-bottom:8px;}
.wsTextarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:11px;
  padding:10px;font-size:14px;background:#fff;outline:none;
  line-height:1.65;resize:vertical;font-family:var(--sans);}
.wsTextarea:focus{border-color:rgba(0,43,92,.40);box-shadow:0 0 0 4px rgba(0,43,92,.06);}
.voteBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0;}
.vBtn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;
  cursor:pointer;text-align:left;font-size:14px;font-weight:700;
  line-height:1.45;transition:.1s ease;color:var(--ink);}
.vBtn:hover{border-color:rgba(0,43,92,.35);}
.vBtn.sel{border-color:rgba(201,162,39,.80);background:rgba(201,162,39,.12);color:#5A4600;}

/* ── Presenter mode ── */
.presenter .layout{max-width:1800px;grid-template-columns:1fr;}
.presenter .sidebar{display:none;}
.presenter .h1{font-size:36px;}
.presenter .p,.presenter .ul{font-size:18px;}
.presenter .content{padding:32px;}

/* ── Responsive ── */
@media(max-width:1100px){.layout{grid-template-columns:1fr;}
  .sidebar{position:relative;top:0;max-height:none;}
  .grid2,.grid3{grid-template-columns:1fr;}}
@media print{.topbar,.sidebar,.controls{display:none!important;}
  .content{box-shadow:none;border:none;} body{background:#fff;}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">NTU</div>
    <div class="brandText">
      <div class="course">IBS｜國際企業經營策略 International Business Strategy</div>
      <div class="topic" id="topicTitle">W4 Sources of Competitive Strategy</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnLang">中英 / EN</button>
    <button class="btn gold" id="btnPresenter">投影模式</button>
    <button class="btn" id="btnReset">重置互動</button>
    <button class="btn" id="btnStudent">學生工作紙</button>
    <button class="btn" id="btnHelp">?</button>
  </div>
</header>

<main class="layout">
  <nav class="sidebar">
    <div class="navTitle" id="navTitle">單元導覽</div>
    <button class="navItem seg-s0 active" data-view="s0" id="nav-s0">🏠 S0｜開場：課程地圖</button>
    <button class="navItem seg-t1" data-view="t1" id="nav-t1">🦸 T1｜Hatam (2023)：制度性超能力</button>
    <button class="navItem seg-t2" data-view="t2" id="nav-t2">🔗 T2｜Value Chain Analysis</button>
    <button class="navItem seg-t3" data-view="t3" id="nav-t3">🗺 T3｜BMC + Porter Generic Strategies</button>
    <button class="navItem seg-c1" data-view="c1" id="nav-c1">📊 C1｜Peloton vs Nautilus 個案</button>
    <button class="navItem seg-s1" data-view="s1" id="nav-s1">🎯 S1｜收束：3 句 Strategy Memo</button>
    <hr class="sep"/>
    <button class="navItem seg-c1" data-view="student" id="nav-student">📝 學生工作紙</button>
    <div class="navFooter">
      <div class="hint">快捷鍵：<span class="kbd">←</span><span class="kbd">→</span> 切換段落・<span class="kbd">L</span> 語言・<span class="kbd">P</span> 投影・<span class="kbd">R</span> 重置</div>
    </div>
  </nav>
  <section class="content" id="content" tabindex="-1"></section>
</main>

<div class="toast" id="toast"></div>

<script>

function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,e:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0)+(p.e||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key); const t=tot(p); const zh=ST.lang==="zh";
  const ttl=zh?title:title_en;
  const fup=zh?followup:followup_en;
  return `<div class="qBox">
    <p class="qTitle">📊 ${ttl}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>
      </div>`).join("")}
      <div class="barWrap"><span class="smallVote">${t} 票 / votes</span></div>
    </div>`:`<div class="barWrap"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="smallVote">${t} 票</span></div>`}
    ${fup&&fup.length?`<hr class="sep"/><p class="sm" style="font-weight:800;margin-bottom:6px;">💬 ${zh?"討論追問":"Discussion prompts"}</p>
    <ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${fup.map(q=>`<li>${q}</li>`).join("")}</ul>`:``}
  </div>`;
}

// ════ DRAG-DROP fill-in ════
function dfInit(containerId){
  const el=document.getElementById(containerId);
  if(!el)return;
  const chips=el.querySelectorAll(".dchip");
  const zones=el.querySelectorAll(".dropzone");
  let dragged=null;
  chips.forEach(c=>{
    c.setAttribute("draggable","true");
    c.addEventListener("dragstart",e=>{dragged=c;c.classList.add("dragging");e.dataTransfer.setData("text",c.dataset.val);});
    c.addEventListener("dragend",()=>{dragged=null;chips.forEach(x=>x.classList.remove("dragging"));});
    // touch
    c.addEventListener("touchstart",e=>{dragged=c;},{ passive:true });
  });
  zones.forEach(z=>{
    z.addEventListener("dragover",e=>{e.preventDefault();z.classList.add("over");});
    z.addEventListener("dragleave",()=>z.classList.remove("over"));
    z.addEventListener("drop",e=>{
      e.preventDefault();z.classList.remove("over");
      if(!dragged)return;
      const prev=z.textContent.trim();
      // return previous to pool
      chips.forEach(c=>{if(c.dataset.val===prev)c.style.display="";});
      z.textContent=dragged.dataset.val;
      z.classList.add("filled");
      dragged.style.display="none";
      dragged=null;
      ST.drops[z.id]=z.textContent;save();
      checkDF(containerId);
    });
    z.addEventListener("click",()=>{
      if(!z.textContent.trim())return;
      chips.forEach(c=>{if(c.dataset.val===z.textContent.trim())c.style.display="";});
      z.textContent="";z.classList.remove("filled","correct-fill","wrong-fill");
      ST.drops[z.id]="";save();
      checkDF(containerId);
    });
  });
}
function checkDF(containerId){
  const el=document.getElementById(containerId);
  if(!el)return;
  const zones=el.querySelectorAll(".dropzone[data-ans]");
  const fb=el.querySelector(".dfeedback");
  let allFilled=true, allCorrect=true;
  zones.forEach(z=>{
    if(!z.textContent.trim()){allFilled=false;}
    if(z.textContent.trim()!==z.dataset.ans){allCorrect=false;}
  });
  if(!allFilled){if(fb)fb.textContent="";return;}
  zones.forEach(z=>{
    z.classList.remove("correct-fill","wrong-fill");
    z.classList.add(z.textContent.trim()===z.dataset.ans?"correct-fill":"wrong-fill");
  });
  if(fb){
    if(allCorrect){fb.textContent="✅ "+(ST.lang==="zh"?"全部正確！":"All correct!");}
    else{fb.textContent="⚠️ "+(ST.lang==="zh"?"有些地方不對，再想想看…":"Some are wrong — try again…");}
  }
}
function restoreDrops(containerId){
  const el=document.getElementById(containerId);if(!el)return;
  const zones=el.querySelectorAll(".dropzone");
  const chips=el.querySelectorAll(".dchip");
  zones.forEach(z=>{
    const v=ST.drops[z.id]||"";
    if(v){z.textContent=v;z.classList.add("filled");
      chips.forEach(c=>{if(c.dataset.val===v)c.style.display="none";});}
  });
  checkDF(containerId);
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const done=ST.quizDone[key];
  const zh=ST.lang==="zh";
  const qtxt=zh?q:q_en;
  const exptxt=zh?exp:exp_en;
  return `<div class="qBox" id="qbox-${key}">
    <p class="qTitle">💡 ${zh?"小測驗":"Quick Check"}</p>
    <p class="p" style="margin-bottom:10px;">${qtxt}</p>
    <div class="options">
      ${opts.map((o,i)=>{
        let cls="opt";
        if(done){cls+=(i===ans?" correct":(done-1===i?" wrong":""));cls+=" ";cls+="opt";}
        return `<button class="${cls.trim()}"${done?" disabled":""} data-quiz="${key}" data-idx="${i}">${String.fromCharCode(65+i)}. ${zh?o[0]:o[1]}</button>`;
      }).join("")}
    </div>
    ${done?`<div class="callout green" style="margin-top:10px;font-size:13px;"><strong>✅ ${zh?"解說":"Explanation"}：</strong>${exptxt}</div>`:``}
  </div>`;
}

function sl(key,def){return ST.sliders[key]??def;}

function sliderRow({key,label,label_en,min,max,step,def,fmt,onChange}){
  const v=sl(key,def);

  return `<div class="sliderRow">
    <span style="font-size:14px;font-weight:700;color:var(--muted);min-width:140px;">${zh?label:label_en}</span>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${v}" id="sl-${key}" oninput="handleSl('${key}',this.value)"/>
    <span class="valBadge" id="slv-${key}">${fmt?fmt(v):v}</span>
  </div>`;
}
function handleSl(key,val){
  setSl(key,+val);
  const badge=document.getElementById("slv-"+key);
  if(badge)badge.textContent=val;
  const fn=window["slCb_"+key];
  if(fn)fn(+val);
}

  document.querySelectorAll("[data-bmc]").forEach(el=>{
    el.addEventListener("click",()=>{
      bmcSel=el.dataset.bmc;
      const d=BMC_DATA[bmcSel];
      const tip=document.getElementById("bmc-tip");
      if(tip&&d){
        tip.innerHTML=`<strong>${ST.lang==="zh"?d.zh:d.en}</strong>: ${ST.lang==="zh"?d.zh_b:d.en_b}`;
      }
      document.querySelectorAll("[data-bmc]").forEach(x=>{
        const bd=BMC_DATA[x.dataset.bmc];
        x.querySelector(".bmc-body").textContent=x.dataset.bmc===bmcSel?(ST.lang==="zh"?bd.zh_b:bd.en_b):"—";
        x.classList.toggle("hl",x.dataset.bmc===bmcSel);
      });
    });
  });
}

    })}
  </div>`;
}

        ["a","Cost Leadership","Cost Leadership","靠最低成本結構取勝。","Winning through lowest cost structure."],
        ["b","Differentiation","Differentiation","提供獨特價值，顧客付溢價。","Unique value, customers pay premium."],
        ["c","Focused Diff.","Focused Differentiation","在高端健身特定市場提供差異化體驗。","Differentiated experience in the premium fitness niche."],
        ["d","Platform/Hybrid","Platform / Hybrid","硬體+訂閱+D2C跨越傳統分類。","Hardware + subscription + D2C spans traditional categories."]
      ].map(([v,lz,le,hz,he])=>`<button class="vBtn${ST.studentVoteB===v?' sel':''}" onclick="wsVote('B','${v}')" id="svB_${v}">
        <div style="font-weight:900;">${zh?lz:le}</div>
        <div class="sm" style="margin-top:4px;">${zh?hz:he}</div>

    </div>
    <textarea class="wsTextarea" id="ws-reply" placeholder="${zh?"[句1 — 下町火箭]\nFSA 的 Value Chain 活動：\n難以複製機制（路徑依賴/社會複雜性/因果曖昧）：\nHatam VECTOR 對應維度（V/E/C/T/O/R）：\n\n[句2 — Institutional Capability]\n哪些 VECTOR 維度已達 institutional 等級？\n為何帝国重工無法用金錢直接購買？\n\n[句3 — Porter + 可持續性]\nPorter 通用策略定位：\n長期可持續的必要條件：":"[S1 — Shitamachi Rocket]\nFSA Value Chain activity:\nInimitability mechanism (path dep./social complexity/causal ambiguity):\nHatam VECTOR dimension (V/E/C/T/O/R):\n\n[S2 — Institutional Capability]\nWhich VECTOR dimensions have reached institutional level?\nWhy can't Teikoku buy it with money?\n\n[S3 — Porter + Sustainability]\nPorter generic strategy positioning:\nLong-term sustainability condition:"}">${ST.studentReply||""}</textarea>

// ════ ROUTER ════
const VIEWS = { s0:viewS0, t1:viewT1, t2:viewT2, t3:viewT3, c1:viewC1, s1:viewS1, student:viewStudent };

function showView(v){
  if(!VIEWS[v])return;
  ST.view=v; save();
  // nav highlight
  document.querySelectorAll(".navItem[data-view]").forEach(el=>{
    el.classList.toggle("active",el.dataset.view===v);
    // apply segment class for active
    const seg=el.dataset.view;
    el.className=el.className.replace(/ seg-\S+/g,"");
    if(["s0","t1","t2","t3","c1","s1","student"].includes(seg))el.classList.add("seg-"+seg);
    if(el.dataset.view===v)el.classList.add("active");
  });
  content.innerHTML = VIEWS[v]();
  content.scrollTop=0;
  // bind interactive
  setTimeout(()=>{
    // polls
    document.querySelectorAll("[data-poll]").forEach(btn=>{
      btn.addEventListener("click",()=>{vote(btn.dataset.poll,btn.dataset.opt);showView(v);});
    });
    // quiz
    document.querySelectorAll("[data-quiz]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const key=btn.dataset.quiz, idx=+btn.dataset.idx;
        if(ST.quizDone[key])return;
        ST.quizDone[key]=idx+1; save();
        showView(v);
      });
    });
    // vc
    if(v==="t2")bindVC();
    // bmc
    if(v==="t3"){bindBMC();dfInit("df-bmc");restoreDrops("df-bmc");}
    // drag-drop
    if(v==="t2"){dfInit("df-vc");restoreDrops("df-vc");}
    // sliders
    document.querySelectorAll("input[type=range]").forEach(el=>{
      el.addEventListener("input",()=>handleSl(el.id.replace("sl-",""),+el.value));
    });
    // trigger slider calcs
    setTimeout(()=>{
      document.querySelectorAll("input[type=range]").forEach(el=>el.dispatchEvent(new Event("input")));
    },80);
  },50);
}

document.getElementById("btnLang").addEventListener("click",()=>{
  ST.lang=ST.lang==="zh"?"en":"zh";save();showView(ST.view);
  showToast(ST.lang==="zh"?"切換為中文":"Switched to English");
});
document.getElementById("btnPresenter").addEventListener("click",()=>{
  ST.presenter=!ST.presenter;save();
  document.body.classList.toggle("presenter",ST.presenter);
  document.getElementById("btnPresenter").textContent=ST.presenter?(ST.lang==="zh"?"結束投影":"Exit Presenter"):(ST.lang==="zh"?"投影模式":"Presenter");
});
document.getElementById("btnReset").addEventListener("click",()=>{
  if(!confirm(ST.lang==="zh"?"確定重置所有互動狀態？":"Reset all interaction state?"))return;
  const kept={lang:ST.lang,presenter:ST.presenter,view:ST.view};
  Object.assign(ST,DEF,kept);save();showView(ST.view);
  showToast(ST.lang==="zh"?"已重置":"Reset");
});
document.getElementById("btnStudent").addEventListener("click",()=>showView("student"));
document.getElementById("btnHelp").addEventListener("click",()=>{
  showToast(ST.lang==="zh"?"← → 切換段落 · L 語言 · P 投影 · R 重置":"← → navigate · L language · P presenter · R reset");
});
document.querySelectorAll(".navItem[data-view]").forEach(el=>{
  el.addEventListener("click",()=>showView(el.dataset.view));
});
document.addEventListener("keydown",e=>{
  if(e.target&&["INPUT","TEXTAREA"].includes(e.target.tagName))return;
  if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
    const i=VIEW_ORDER.indexOf(ST.view);
    const ni=e.key==="ArrowRight"?Math.min(i+1,VIEW_ORDER.length-1):Math.max(i-1,0);
    showView(VIEW_ORDER[ni]);showToast(VIEW_ORDER[ni]);
  }
  if(e.key==="l"||e.key==="L"){document.getElementById("btnLang").click();}
  if(e.key==="p"||e.key==="P"){document.getElementById("btnPresenter").click();}
  if(e.key==="r"||e.key==="R"){document.getElementById("btnReset").click();}
  if(e.key==="?"){document.getElementById("btnHelp").click();}
});

// ════ INIT ════
document.body.classList.toggle("presenter",ST.presenter);
if(ST.presenter){document.getElementById("btnPresenter").textContent=ST.lang==="zh"?"結束投影":"Exit Presenter";}
showView(ST.view||"s0");
